<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新楓之谷裝備配裝動態模擬器</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #1a1a1f;
            color: #e0e0e6;
            margin: 0;
            padding: 20px 10px;
            display: block;
            text-align: center;
        }
        h1 { color: #f3c623; margin-bottom: 5px; font-size: 24px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 15px; }
        
        /* 縮放控制列 */
        .control-panel {
            margin-bottom: 20px;
            background: #25252b;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid #3a3a45;
        }
        .control-panel label {
            font-size: 14px;
            color: #ccc;
            margin-right: 10px;
        }
        .control-panel button {
            background: #3a3a45;
            color: white;
            border: none;
            padding: 6px 14px;
            margin: 0 5px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .control-panel button:hover { background: #555566; }
        .control-panel button.active {
            background: #00ff64;
            color: #111;
            font-weight: bold;
        }

        /* 縮放外殼容器 */
        .scale-container {
            display: inline-block;
            margin: 0 auto;
            transform-origin: top center;
            transition: transform 0.2s ease;
        }

        /* 裝備外殼 (基礎 100% 大小) */
        .equipment-wrapper {
            position: relative;
            width: 460px;
            height: 504px;
            background-image: url('螢幕擷取畫面 2026-07-09 101829.jpg');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        /* 裝備格子樣式 */
        .slot {
            position: absolute;
            cursor: pointer;
            background: rgba(255, 255, 255, 0);
            border: 2px solid transparent;
            border-radius: 4px;
            z-index: 10;
            width: 12.3%;
            height: 11.2%;
        }
        
        .slot:hover {
            background: rgba(0, 255, 100, 0.05);
            border-color: #00ff64;
            box-shadow: inset 0 0 5px rgba(0, 255, 100, 0.6);
            z-index: 50;
        }

        /* 被新裝備完整覆蓋的圖層 - 放大圖片並裁切掉灰色外殼，完美無縫填滿 */
        .slot .equipped-badge {
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            /* 背景圖片會由 JS 根據點選的選項動態塞入 (例如 A-1.png, B-3.png) */
            background-size: 124% 124%; 
            background-repeat: no-repeat;
            background-position: center 45%;
            border-radius: 4px;
            display: flex;
            align-items: flex-end; 
            justify-content: center;
            pointer-events: none; 
            border: 2px solid #555; 
            box-shadow: inset 0 0 6px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* 覆蓋圖層內的小字裝備標籤 */
        .slot .equipped-badge span {
            background: rgba(16, 18, 23, 0.85);
            color: #fff;
            font-size: 10px;
            width: 100%;
            padding: 2px 0;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.5px;
        }

        /* 浮動選單外殼 */
        .tooltip {
            display: none;
            position: absolute;
            width: 260px;
            background-color: rgba(16, 18, 23, 0.98);
            border: 1px solid #00ff64;
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.8);
            z-index: 100;
            text-align: left;
            cursor: default;
        }
        
        .slot:hover .tooltip {
            display: block;
        }

        .slot.side-left .tooltip {
            left: 108%;
            top: 50%;
            transform: translateY(-40%);
        }
        .slot.side-right .tooltip {
            right: 108%;
            top: 50%;
            transform: translateY(-40%);
        }

        .tooltip-title {
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
            border-bottom: 1px solid #333;
            padding-bottom: 6px;
        }
        .tooltip-title span { color: #f3c623; }
        .current-equipped { font-size: 11px; color: #00ffbc; margin-top: 2px; display: block;}

        .options-container { width: 100%; }

        .option-item {
            width: 100%;
            margin-bottom: 8px;
            font-size: 12px;
            background: rgba(255,255,255,0.04);
            padding: 8px;
            border-radius: 4px;
            border-left: 4px solid #555;
            cursor: pointer;
            transition: background 0.15s;
        }
        .option-item:hover {
            background: rgba(0, 255, 100, 0.1);
            border-top: 1px solid rgba(0,255,100,0.2);
            border-right: 1px solid rgba(0,255,100,0.2);
            border-bottom: 1px solid rgba(0,255,100,0.2);
        }
        .option-item:last-child { margin-bottom: 0; }
        
        .option-item.tier-1 { border-left-color: #aaa; } 
        .option-item.tier-2 { border-left-color: #3498db; } 
        .option-item.tier-3 { border-left-color: #e74c3c; } 

        .option-header { font-weight: bold; margin-bottom: 4px; display: block; }
        .tier-1 .option-header { color: #bbb; }
        .tier-2 .option-header { color: #5dade2; }
        .tier-3 .option-header { color: #f1948a; }

        .option-body { display: flex; width: 100%; }
        
        .option-img {
            width: 32px;
            height: 32px;
            background-size: 120% 120%;
            background-position: center;
            border: 1px solid #444;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .option-text {
            padding-left: 8px;
            color: #ccc;
            line-height: 1.3;
        }

        /* ==========================================================
           24 個裝備格子完美對齊底圖坐標校正
           ========================================================== */
        /* 左側直列 1 */
        .s-ring1 { top: 10.5%; left: 4.3%; }
        .s-pendant1 { top: 22.5%; left: 4.3%; }
        .s-ring2 { top: 34.5%; left: 4.3%; }
        .s-ring3 { top: 46.5%; left: 4.3%; }
        .s-belt { top: 58.5%; left: 4.3%; }

        /* 左側直列 2 */
        .s-pocket { top: 10.5%; left: 17.5%; }
        .s-face { top: 22.5%; left: 17.5%; }
        .s-eye { top: 34.5%; left: 17.5%; }
        .s-earring { top: 46.5%; left: 17.5%; }
        .s-shoulder { top: 58.5%; left: 17.5%; }

        /* 底部橫列 */
        .s-book { top: 70.5%; left: 4.3%; }
        .s-weapon { top: 58.5%; left: 30.5%; }
        .s-subweapon { top: 58.5%; left: 44%; }
        .s-emblem { top: 58.5%; left: 57%; }

        /* 右側直列 1 */
        .s-hat { top: 10.5%; left: 70.2%; }
        .s-top { top: 22.5%; left: 70.2%; }
        .s-bottom { top: 34.5%; left: 70.2%; }
        .s-cape { top: 46.5%; left: 70.2%; }
        .s-badge { top: 58.5%; left: 70.2%; }

        /* 右側直列 2 */
        .s-glove { top: 10.5%; left: 83.5%; }
        .s-shoe { top: 22.5%; left: 83.5%; }
        .s-empty-slot { top: 34.5%; left: 83.5%; }
        .s-android { top: 46.5%; left: 83.5%; }
        .s-heart { top: 58.5%; left: 83.5%; }
        .s-medal { top: 68.9%; left: 83.5%; }
    </style>
</head>
<body>

    <h1>新楓之谷全裝備新手配裝模擬器</h1>
    <p>滑鼠移至任一裝備格，可點擊選單內的裝備方案來替換模擬</p>

    <div class="control-panel">
        <label>模擬器大小縮放：</label>
        <button onclick="changeScale(1, this)" class="active">100%</button>
        <button onclick="changeScale(1.2, this)">120%</button>
        <button onclick="changeScale(1.5, this)">150%</button>
    </div>

    <br>

    <div class="scale-container" id="scaleContainer">
        <div class="equipment-wrapper" id="equipmentWrapper">
            </div>
    </div>

    <script>
        function changeScale(scaleValue, buttonElement) {
            document.getElementById('scaleContainer').style.transform = `scale(${scaleValue})`;
            const buttons = document.querySelectorAll('.control-panel button');
            buttons.forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
        }

        // 裝備資料庫：新增 prefix 欄位 (A 到 X)，用於自動尋找對應的圖片檔名
        const slotData = [
            { id: "ring1", prefix: "A", name: "戒指 1", side: "side-left", cls: "s-ring1", t1: "活動戒指", t2: "頂級培羅德戒指", t3: "苦痛的根源" },
            { id: "pendant1", prefix: "B", name: "項鍊 1", side: "side-left", cls: "s-pendant1", t1: "混沌雷之耳語", t2: "頂級培羅德烙印項鍊", t3: "魔導士項鍊" },
            { id: "ring2", prefix: "C", name: "戒指 2", side: "side-left", cls: "s-ring2", t1: "銀花戒指", t2: "邁斯特戒指", t3: "巨大恐懼" },
            { id: "ring3", prefix: "D", name: "戒指 3", side: "side-left", cls: "s-ring3", t1: "高貴伊菲雅戒指", t2: "天破/羅曼戒指", t3: "指揮官戒指" },
            { id: "belt", prefix: "E", name: "腰帶", side: "side-left", cls: "s-belt", t1: "金草葉腰帶", t2: "頂級培羅德腰帶", t3: "夢幻腰帶" },
            
            { id: "pocket", prefix: "F", name: "口袋物品", side: "side-left", cls: "s-pocket", t1: "粉紅聖杯", t2: "凶獸意志", t3: "魔導士咒文書" },
            { id: "face", prefix: "G", name: "臉飾", side: "side-left", cls: "s-face", t1: "凝結的結晶石", t2: "波賽頓紋身", t3: "米特拉的憤怒" },
            { id: "eye", prefix: "H", name: "眼飾", side: "side-left", cls: "s-eye", t1: "水中鏡片", t2: "黑邊眼罩/波賽頓", t3: "魔導士眼罩" },
            { id: "earring", prefix: "I", name: "耳環", side: "side-left", cls: "s-earring", t1: "迪亞雷斯耳環", t2: "頂級培羅德耳環", t3: "指揮官耳環" },
            { id: "shoulder", prefix: "J", name: "肩飾", side: "side-left", cls: "s-shoulder", t1: "皇家黑金屬肩飾", t2: "神祕之影肩飾", t3: "永恆套裝肩飾" },
            
            { id: "book", prefix: "K", name: "特殊欄/底座", side: "side-left", cls: "s-book", t1: "一般特殊書", t2: "進階追真書", t3: "頂級特殊裝備" },
            { id: "weapon", prefix: "L", name: "武器", side: "side-left", cls: "s-weapon", t1: "航海師武器", t2: "神祕之影武器", t3: "創世解封武器" },
            { id: "subweapon", prefix: "M", name: "副武器", side: "side-right", cls: "s-subweapon", t1: "一般副武", t2: "楓之谷利刃/盾牌", t3: "進階米特拉副武" },
            { id: "emblem", prefix: "N", name: "能源徽章", side: "side-right", cls: "s-emblem", t1: "黃金徽章", t2: "中階紋章", t3: "米特拉的能源" },
            
            { id: "hat", prefix: "O", name: "帽子", side: "side-right", cls: "s-hat", t1: "深淵帽子", t2: "神祕之影帽子", t3: "永恆套裝帽子" },
            { id: "top", prefix: "P", name: "上衣", side: "side-right", cls: "s-top", t1: "深淵上衣", t2: "神祕之影(模擬)", t3: "永恆套裝上衣" },
            { id: "bottom", prefix: "Q", name: "下衣", side: "side-right", cls: "s-bottom", t1: "深淵下衣", t2: "神祕之影(模擬)", t3: "永恆套裝下衣" },
            { id: "cape", prefix: "R", name: "披風", side: "side-right", cls: "s-cape", t1: "航海師披風", t2: "神祕之影披風", t3: "永恆套裝披風" },
            { id: "badge", prefix: "S", name: "徽章", side: "side-right", cls: "s-badge", t1: "水晶溫室", t2: "幽靈船徽章", t3: "創世/漆黑徽章" },
            
            { id: "glove", prefix: "T", name: "手套", side: "side-right", cls: "s-glove", t1: "航海師手套", t2: "神祕之影手套", t3: "永恆套裝手套" },
            { id: "shoe", prefix: "U", name: "鞋子", side: "side-right", cls: "s-shoe", t1: "航海師鞋子", t2: "神祕之影鞋子", t3: "永恆套裝鞋子" },
            { id: "empty-slot", prefix: "V", name: "外觀擴充格", side: "side-right", cls: "s-empty-slot", t1: "無過渡", t2: "外觀欄位", t3: "特殊功能擴充" },
            { id: "android", prefix: "W", name: "機器人", side: "side-right", cls: "s-android", t1: "活動機器人", t2: "高級機器人", t3: "男爵/女爵心願機器人" },
            { id: "heart", prefix: "X", name: "無法者心臟", side: "side-right", cls: "s-heart", t1: "鋰之心", t2: "鈦之心", t3: "無法者之心" },
            { id: "medal", prefix: "Y", name: "勳章", side: "side-right", cls: "s-medal", t1: "七天怪公勳章", t2: "中階活動勳章", t3: "極限突破/神之子勳章" }
        ];

        const wrapper = document.getElementById('equipmentWrapper');
        
        slotData.forEach(slot => {
            const slotHtml = `
                <div class="slot ${slot.cls} ${slot.side}" id="slot-${slot.id}">
                    <div class="tooltip" onclick="event.stopPropagation();">
                        <div class="tooltip-title">
                            當前位置：<span>${slot.name} (${slot.prefix})</span>
                            <span class="current-equipped" id="current-${slot.id}">未裝備</span>
                        </div>
                        <div class="options-container">
                            <div class="option-item tier-1" onclick="equipItem('${slot.id}', '${slot.t1}', '#aaaaaa', '${slot.prefix}-1.png')">
                                <span class="option-header">① 入門小資首選</span>
                                <div class="option-body">
                                    <div class="option-img" style="background-image: url('${slot.prefix}-1.png');"></div>
                                    <div class="option-text">${slot.t1}</div>
                                </div>
                            </div>
                            <div class="option-item tier-2" onclick="equipItem('${slot.id}', '${slot.t2}', '#3498db', '${slot.prefix}-2.png')">
                                <span class="option-header">② 主流中階配置</span>
                                <div class="option-body">
                                    <div class="option-img" style="background-image: url('${slot.prefix}-2.png');"></div>
                                    <div class="option-text">${slot.t2}</div>
                                </div>
                            </div>
                            <div class="option-item tier-3" onclick="equipItem('${slot.id}', '${slot.t3}', '#e74c3c', '${slot.prefix}-3.png')">
                                <span class="option-header">③ 畢業進階目標</span>
                                <div class="option-body">
                                    <div class="option-img" style="background-image: url('${slot.prefix}-3.png');"></div>
                                    <div class="option-text">${slot.t3}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            wrapper.insertAdjacentHTML('beforeend', slotHtml);
        });

        // 點擊選項時，會自動傳入該裝備對應的圖片名稱 (imgName)
        function equipItem(slotId, itemName, borderColor, imgName) {
            const slotDiv = document.getElementById(`slot-${slotId}`);
            const oldBadge = slotDiv.querySelector('.equipped-badge');
            if (oldBadge) { oldBadge.remove(); }
            
            const badge = document.createElement('div');
            badge.className = 'equipped-badge';
            badge.style.borderColor = borderColor; 
            // 讓覆蓋圖層完美載入該編號的圖片
            badge.style.backgroundImage = `url('${imgName}')`;
            
            const nameSpan = document.createElement('span');
            nameSpan.innerText = itemName;
            badge.appendChild(nameSpan);
            
            slotDiv.appendChild(badge);
            document.getElementById(`current-${slotId}`).innerText = `已裝備：${itemName}`;
        }
    </script>
</body>
</html>
