    <style>
        * { box-sizing: border-box; }
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #1a1a1f;
            color: #e0e0e6;
            margin: 0;
            padding: 20px 10px;
            display: block;
            text-align: center;
        }
        h1 { color: #f3c623; margin-bottom: 5px; font-size: 24px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 15px; }
        
        /* 縮放控制列 */
        .control-panel {
            margin-bottom: 20px;
            background: #25252b;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid #3a3a45;
        }
        .control-panel label {
            font-size: 14px;
            color: #ccc;
            margin-right: 10px;
        }
        .control-panel button {
            background: #3a3a45;
            color: white;
            border: none;
            padding: 6px 14px;
            margin: 0 5px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .control-panel button:hover { background: #555566; }
        .control-panel button.active {
            background: #00ff64;
            color: #111;
            font-weight: bold;
        }

        /* 縮放外殼容器 */
        .scale-container {
            display: inline-block;
            margin: 0 auto;
            transform-origin: top center;
            transition: transform 0.2s ease;
        }

        /* 裝備主外殼 (寬度固定 460px) */
        .equipment-wrapper {
            position: relative;
            width: 460px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-radius: 10px;
            
        }

        /* 分頁內容基礎樣式 */
        .tab-content {
            display: none; /* 預設隱藏 */
            position: relative;
            width: 100%;
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }
        
        /* 作用中的分頁顯示 */
        .tab-content.active {
            display: block;
        }

        /* 裝備分頁高度與底圖 */
        #tab-equip {
            height: 504px;
            background-image: url('螢幕擷取畫面 2026-07-09 101829.jpg');
        }

        /* 時裝分頁高度與底圖 (依原圖比例 1:1 調整高度為 460px) */
        #tab-coord {
            height: 460px; 
            background-image: url('螢幕擷取畫面 2026-07-09 153219.jpg');
        }

        /* 右上角切換按鈕 (透明覆蓋在原圖按鈕上) */
        .tab-toggle-btn {
            position: absolute;
            top: 3%;
            right: 4%;
            width: 26%;
            height: 6.5%;
            cursor: pointer;
            background: rgba(255, 255, 255, 0); /* 透明 */
            border: 2px solid transparent;
            border-radius: 15px;
            z-index: 90;
        }
        .tab-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* 裝備格子樣式 */
        .slot {
            position: absolute;
            cursor: pointer;
            background: rgba(255, 255, 255, 0);
            border: 2px solid transparent;
            border-radius: 4px;
            z-index: 10;
        }
        
        /* 裝備分頁的格子尺寸 */
        #tab-equip .slot {
            width: 12.3%;
            height: 11.2%;
        }

        /* 時裝分頁的格子尺寸 (比例微調) */
        #tab-coord .slot {
            width: 12.3%;
            height: 12.3%;
        }
        
        .slot:hover {
            background: rgba(0, 255, 100, 0.05);
            border-color: #00ff64;
            box-shadow: inset 0 0 5px rgba(0, 255, 100, 0.6);
            z-index: 50;
        }

        /* 被新裝備完整覆蓋的圖層 */
        .slot .equipped-badge {
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            background-size: 124% 124%; 
            background-repeat: no-repeat;
            background-position: center 45%;
            border-radius: 4px;
            display: flex;
            align-items: flex-end; 
            justify-content: center;
            pointer-events: none; 
            border: 2px solid #555; 
            box-shadow: inset 0 0 6px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* 覆蓋圖層內的小字裝備標籤 */
        .slot .equipped-badge span {
            background: rgba(16, 18, 23, 0.85);
            color: #fff;
            font-size: 10px;
            width: 100%;
            padding: 2px 0;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.5px;
        }

        /* 浮動選單外殼 */
        .tooltip {
            display: none;
            position: absolute;
            width: 260px;
            background-color: rgba(16, 18, 23, 0.98);
            border: 1px solid #00ff64;
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.8);
            z-index: 100;
            text-align: left;
            cursor: default;
        }
        
        .slot:hover .tooltip {
            display: block;
        }

        .slot.side-left .tooltip {
            left: 108%;
            top: 50%;
            transform: translateY(-40%);
        }
        .slot.side-right .tooltip {
            right: 108%;
            top: 50%;
            transform: translateY(-40%);
        }
        /* 時裝最下排三個格子的浮動選單向上彈出，避免被遮擋 */
        .slot.side-bottom .tooltip {
            bottom: 108%;
            left: 50%;
            transform: translateX(-50%);
        }

        .tooltip-title {
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
            border-bottom: 1px solid #333;
            padding-bottom: 6px;
        }
        .tooltip-title span { color: #f3c623; }
        .current-equipped { font-size: 11px; color: #00ffbc; margin-top: 2px; display: block;}

        .options-container { width: 100%; }

        .option-item {
            width: 100%;
            margin-bottom: 8px;
            font-size: 12px;
            background: rgba(255,255,255,0.04);
            padding: 8px;
            border-radius: 4px;
            border-left: 4px solid #555;
            cursor: pointer;
            transition: background 0.15s;
        }
        .option-item:hover {
            background: rgba(0, 255, 100, 0.1);
            border-top: 1px solid rgba(0,255,100,0.2);
            border-right: 1px solid rgba(0,255,100,0.2);
            border-bottom: 1px solid rgba(0,255,100,0.2);
        }
        .option-item:last-child { margin-bottom: 0; }
        
        .option-item.tier-1 { border-left-color: #aaa; } 
        .option-item.tier-2 { border-left-color: #3498db; } 
        .option-item.tier-3 { border-left-color: #e74c3c; } 

        .option-header { font-weight: bold; margin-bottom: 4px; display: block; }
        .tier-1 .option-header { color: #bbb; }
        .tier-2 .option-header { color: #5dade2; }
        .tier-3 .option-header { color: #f1948a; }

        .option-body { display: flex; width: 100%; }
        
        .option-img {
            width: 32px;
            height: 32px;
            background-size: 120% 120%;
            background-position: center;
            border: 1px solid #444;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .option-text {
            padding-left: 8px;
            color: #ccc;
            line-height: 1.3;
        }

        /* ==========================================================

        // 生成格子的通用渲染函式
        function renderSlots(dataArray, targetContainerId) {
    const container = document.getElementById(targetContainerId);
    dataArray.forEach(slot => {
        // 自動檢查選項內容，若為 "無其他推薦" 則設為空字串，前端就不會顯示
        const opt1Html = slot.t1 === "無其他推薦" ? "" : `
            <div class="option-item tier-1" onclick="equipItem('${slot.id}', '${slot.t1}', '#aaaaaa', '${slot.prefix}-1.png')">
                <span class="option-header">${slot.h1}</span>
                <div class="option-body">
                    <div class="option-img" style="background-image: url('${slot.prefix}-1.png');"></div>
                    <div class="option-text">${slot.t1}</div>
                </div>
            </div>`;
            
        const opt2Html = slot.t2 === "無其他推薦" ? "" : `
            <div class="option-item tier-2" onclick="equipItem('${slot.id}', '${slot.t2}', '#3498db', '${slot.prefix}-2.png')">
                <span class="option-header">${slot.h2}</span>
                <div class="option-body">
                    <div class="option-img" style="background-image: url('${slot.prefix}-2.png');"></div>
                    <div class="option-text">${slot.t2}</div>
                </div>
            </div>`;
            
        const opt3Html = slot.t3 === "無其他推薦" ? "" : `
            <div class="option-item tier-3" onclick="equipItem('${slot.id}', '${slot.t3}', '#e74c3c', '${slot.prefix}-3.png')">
                <span class="option-header">${slot.h3}</span>
                <div class="option-body">
                    <div class="option-img" style="background-image: url('${slot.prefix}-3.png');"></div>
                    <div class="option-text">${slot.t3}</div>
                </div>
            </div>`;

        const slotHtml = `
            <div class="slot ${slot.cls} ${slot.side}" id="slot-${slot.id}">
                <div class="tooltip" onclick="event.stopPropagation();">
                    <div class="tooltip-title">
                        當前位置：<span>${slot.name} (${slot.prefix})</span>
                        <span class="current-equipped" id="current-${slot.id}">未裝備</span>
                    </div>
                    <div class="options-container">
                        ${opt1Html}
                        ${opt2Html}
                        ${opt3Html}
                    </div>
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', slotHtml);
    });
}

        // 頁面初始化載入
        renderSlots(slotData, 'tab-equip');
        renderSlots(coordData, 'tab-coord');

        // 點擊選項時載入裝備
        function equipItem(slotId, itemName, borderColor, imgName) {
            const slotDiv = document.getElementById(`slot-${slotId}`);
            const oldBadge = slotDiv.querySelector('.equipped-badge');
            if (oldBadge) { oldBadge.remove(); }
            
            const badge = document.createElement('div');
            badge.className = 'equipped-badge';
            badge.style.borderColor = borderColor; 
            badge.style.backgroundImage = `url('${imgName}')`;
            
            const nameSpan = document.createElement('span');
            nameSpan.innerText = itemName;
            badge.appendChild(nameSpan);
            
            slotDiv.appendChild(badge);
            document.getElementById(`current-${slotId}`).innerText = `已裝備：${itemName}`;
        }
    </script>
