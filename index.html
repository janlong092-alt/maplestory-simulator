<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新楓之谷裝備配裝動態模擬器</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #1a1a1f;
            color: #e0e0e6;
            margin: 0;
            padding: 20px 10px;
            display: block;
            text-align: center;
        }
        h1 { color: #f3c623; margin-bottom: 5px; font-size: 24px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 15px; }
        
        /* 縮放控制列 */
        .control-panel {
            margin-bottom: 20px;
            background: #25252b;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid #3a3a45;
        }
        .control-panel label {
            font-size: 14px;
            color: #ccc;
            margin-right: 10px;
        }
        .control-panel button {
            background: #3a3a45;
            color: white;
            border: none;
            padding: 6px 14px;
            margin: 0 5px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .control-panel button:hover { background: #555566; }
        .control-panel button.active {
            background: #00ff64;
            color: #111;
            font-weight: bold;
        }

        /* 縮放外殼容器 */
        .scale-container {
            display: inline-block;
            margin: 0 auto;
            transform-origin: top center;
            transition: transform 0.2s ease;
        }

        /* 裝備外殼 (基礎 100% 大小) */
        .equipment-wrapper {
            position: relative;
            width: 460px;
            height: 504px;
            background-image: url('螢幕擷取畫面 2026-07-09 101829.jpg');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        /* 裝備格子樣式 */
        .slot {
            position: absolute;
            cursor: pointer;
            background: rgba(255, 255, 255, 0);
            border: 2px solid transparent;
            border-radius: 4px;
            z-index: 10;
            width: 12.3%;
            height: 11.2%;
        }
        
        .slot:hover {
            background: rgba(0, 255, 100, 0.05);
            border-color: #00ff64;
            box-shadow: inset 0 0 5px rgba(0, 255, 100, 0.6);
            z-index: 50;
        }

        /* 被新裝備完整覆蓋的圖層 */
        .slot .equipped-badge {
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            background-size: 124% 124%; 
            background-repeat: no-repeat;
            background-position: center 45%;
            border-radius: 4px;
            display: flex;
            align-items: flex-end; 
            justify-content: center;
            pointer-events: none; 
            border: 2px solid #555; 
            box-shadow: inset 0 0 6px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* 覆蓋圖層內的小字裝備標籤 */
        .slot .equipped-badge span {
            background: rgba(16, 18, 23, 0.85);
            color: #fff;
            font-size: 10px;
            width: 100%;
            padding: 2px 0;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.5px;
        }

        /* 浮動選單外殼 */
        .tooltip {
            display: none;
            position: absolute;
            width: 260px;
            background-color: rgba(16, 18, 23, 0.98);
            border: 1px solid #00ff64;
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.8);
            z-index: 100;
            text-align: left;
            cursor: default;
        }
        
        .slot:hover .tooltip {
            display: block;
        }

        .slot.side-left .tooltip {
            left: 108%;
            top: 50%;
            transform: translateY(-40%);
        }
        .slot.side-right .tooltip {
            right: 108%;
            top: 50%;
            transform: translateY(-40%);
        }

        .tooltip-title {
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
            border-bottom: 1px solid #333;
            padding-bottom: 6px;
        }
        .tooltip-title span { color: #f3c623; }
        .current-equipped { font-size: 11px; color: #00ffbc; margin-top: 2px; display: block;}

        .options-container { width: 100%; }

        .option-item {
            width: 100%;
            margin-bottom: 8px;
            font-size: 12px;
            background: rgba(255,255,255,0.04);
            padding: 8px;
            border-radius: 4px;
            border-left: 4px solid #555;
            cursor: pointer;
            transition: background 0.15s;
        }
        .option-item:hover {
            background: rgba(0, 255, 100, 0.1);
            border-top: 1px solid rgba(0,255,100,0.2);
            border-right: 1px solid rgba(0,255,100,0.2);
            border-bottom: 1px solid rgba(0,255,100,0.2);
        }
        .option-item:last-child { margin-bottom: 0; }
        
        .option-item.tier-1 { border-left-color: #aaa; } 
        .option-item.tier-2 { border-left-color: #3498db; } 
        .option-item.tier-3 { border-left-color: #e74c3c; } 

        .option-header { font-weight: bold; margin-bottom: 4px; display: block; }
        .tier-1 .option-header { color: #bbb; }
        .tier-2 .option-header { color: #5dade2; }
        .tier-3 .option-header { color: #f1948a; }

        .option-body { display: flex; width: 100%; }
        
        .option-img {
            width: 32px;
            height: 32px;
            background-size: 120% 120%;
            background-position: center;
            border: 1px solid #444;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .option-text {
            padding-left: 8px;
            color: #ccc;
            line-height: 1.3;
        }

        /* ==========================================================
           24 個裝備格子完美對齊底圖坐標校正
           ========================================================== */
        .s-ring1 { top: 10.5%; left: 4.3%; }
        .s-pendant1 { top: 22.5%; left: 4.3%; }
        .s-ring2 { top: 34.5%; left: 4.3%; }
        .s-ring3 { top: 46.5%; left: 4.3%; }
        .s-belt { top: 58.5%; left: 4.3%; }

        .s-pocket { top: 10.5%; left: 17.5%; }
        .s-face { top: 22.5%; left: 17.5%; }
        .s-eye { top: 34.5%; left: 17.5%; }
        .s-earring { top: 46.5%; left: 17.5%; }

        .s-book { top: 70.5%; left: 4.3%; }

        .s-subweapon { top: 58.5%; left: 44%; }
        .s-emblem { top: 58.5%; left: 57%; }

        .s-hat { top: 10.5%; left: 70.2%; }

        .s-glove { top: 10.5%; left: 83.5%; }

        .s-heart { top: 58.5%; left: 83.5%; }
        .s-medal { top: 70.5%; left: 83.5%; }
    </style>
</head>

            { id: "weapon", prefix: "L", name: "主武器", side: "side-left", cls: "s-weapon", 
              h1: "① 入門高CP值", t1: "神秘武器系列", 
              h2: "② 當前主流配置", t2: "創世武器系列", 
              h3: "③ 畢業裝備", t3: "命運武器系列" },
            
            { id: "subweapon", prefix: "M", name: "副武器", side: "side-right", cls: "s-subweapon",

              h3: "③ 當前主流/畢業裝備", t3: "永恆褲子系列" },
            
            { id: "cape", prefix: "R", name: "肩膀裝飾", side: "side-right", cls: "s-cape", 
              h1: "① 選用裝備", t1: "航海師護肩系列", 
              h2: "② 入門配置", t2: "神秘冥界護肩系列", 
              h3: "③ 當前主流/畢業裝備", t3: "永恆肩膀系列" },
            
            { id: "badge", prefix: "S", name: "機器人", side: "side-right", cls: "s-badge", 
              h1: "① 外觀自由搭配", t1: "任選機器人", 
              h2: "② 外觀自由搭配", t2: "任選機器人", 
              h3: "③ 外觀自由搭配", t3: "任選機器人" },

              h1: "① 階段一", t1: "VIP修菲凱曼的黃金胸章", 
              h2: "② 階段二", t2: "轉移創世的胸章",

        const wrapper = document.getElementById('equipmentWrapper');
        
        slotData.forEach(slot => {
            // 檢查選項內容是否為 "無其他推薦"，如果是，將該選項的 HTML 設為空字串，後面就不會顯示
            const opt1Html = slot.t1 === "無其他推薦" ? "" : `
                <div class="option-item tier-1" onclick="equipItem('${slot.id}', '${slot.t1}', '#aaaaaa', '${slot.prefix}-1.png')">
                    <span class="option-header">${slot.h1}</span>
                    <div class="option-body">
                        <div class="option-img" style="background-image: url('${slot.prefix}-1.png');"></div>
                        <div class="option-text">${slot.t1}</div>
                    </div>
                </div>`;
                
            const opt2Html = slot.t2 === "無其他推薦" ? "" : `
                <div class="option-item tier-2" onclick="equipItem('${slot.id}', '${slot.t2}', '#3498db', '${slot.prefix}-2.png')">
                    <span class="option-header">${slot.h2}</span>
                    <div class="option-body">
                        <div class="option-img" style="background-image: url('${slot.prefix}-2.png');"></div>
                        <div class="option-text">${slot.t2}</div>
                    </div>
                </div>`;
                
            const opt3Html = slot.t3 === "無其他推薦" ? "" : `
                <div class="option-item tier-3" onclick="equipItem('${slot.id}', '${slot.t3}', '#e74c3c', '${slot.prefix}-3.png')">
                    <span class="option-header">${slot.h3}</span>
                    <div class="option-body">
                        <div class="option-img" style="background-image: url('${slot.prefix}-3.png');"></div>
                        <div class="option-text">${slot.t3}</div>
                    </div>
                </div>`;

            const slotHtml = `
                <div class="slot ${slot.cls} ${slot.side}" id="slot-${slot.id}">
                    <div class="tooltip" onclick="event.stopPropagation();">
                        <div class="tooltip-title">
                            當前位置：<span>${slot.name} (${slot.prefix})</span>
                            <span class="current-equipped" id="current-${slot.id}">未裝備</span>
                        </div>
                        <div class="options-container">
                            ${opt1Html}
                            ${opt2Html}
                            ${opt3Html}
                        </div>
                    </div>
                </div>
            `;
            wrapper.insertAdjacentHTML('beforeend', slotHtml);
        });

        // 點擊選項時載入裝備
        function equipItem(slotId, itemName, borderColor, imgName) {
            const slotDiv = document.getElementById(`slot-${slotId}`);
            const oldBadge = slotDiv.querySelector('.equipped-badge');
            if (oldBadge) { oldBadge.remove(); }
            
            const badge = document.createElement('div');
            badge.className = 'equipped-badge';
            badge.style.borderColor = borderColor; 
            badge.style.backgroundImage = `url('${imgName}')`;
            
            const nameSpan = document.createElement('span');
            nameSpan.innerText = itemName;
            badge.appendChild(nameSpan);
            
            slotDiv.appendChild(badge);
            document.getElementById(`current-${slotId}`).innerText = `已裝備：${itemName}`;
        }
    </script>
</body>
</html>
