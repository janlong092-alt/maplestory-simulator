<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新楓之谷裝備配裝動態模擬器</title>
    <style>
        /* ==========================================================
           [主題變數定義] 
           ========================================================== */
        :root {
            /* 預設暗色模式變數 */
            --bg-color: #1a1a1f;
            --text-color: #e0e0e6;
            --text-muted: #ccc;
            --panel-bg: #25252b;
            --border-color: #3a3a45;
            --highlight: #f3c623;
            --tooltip-bg: rgba(16, 18, 23, 0.98);
            --tooltip-border: #00ff64;
            --option-bg: rgba(255, 255, 255, 0.04);
            --option-hover-bg: rgba(0, 255, 100, 0.1);
            --option-hover-border: rgba(0, 255, 100, 0.2);
            --btn-bg: #3a3a45;
            --btn-hover: #555566;
            --btn-text: white;
        }

        body.light-mode {
            /* 亮色模式變數 */
            --bg-color: #eeeeee;
            --text-color: #222222;
            --text-muted: #555555;
            --panel-bg: #ffffff;
            --border-color: #cccccc;
            --highlight: #d4a600;
            --tooltip-bg: rgba(255, 255, 255, 0.95);
            --tooltip-border: #00b347;
            --option-bg: rgba(0, 0, 0, 0.05);
            --option-hover-bg: rgba(0, 200, 80, 0.15);
            --option-hover-border: rgba(0, 200, 80, 0.3);
            --btn-bg: #e0e0e0;
            --btn-hover: #cccccc;
            --btn-text: #111111;
        }

        * { box-sizing: border-box; }
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px 10px;
            display: block;
            text-align: center;
            transition: background-color 0.3s, color 0.3s;
        }
        h1 { color: var(--highlight); margin-bottom: 5px; font-size: 24px; transition: color 0.3s;}
        p { color: var(--text-muted); font-size: 14px; margin-bottom: 15px; transition: color 0.3s;}
        
        /* ==========================================================
           [縮放與控制列] 
           ========================================================== */
        .control-panel {
            margin-bottom: 20px;
            background: var(--panel-bg);
            display: inline-block;
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            transition: background-color 0.3s, border-color 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .control-panel label {
            font-size: 14px;
            color: var(--text-muted);
        }
        .control-panel input[type="range"] {
            cursor: pointer;
            vertical-align: middle;
        }
        #scaleValue {
            font-size: 14px;
            font-weight: bold;
            color: var(--highlight);
            min-width: 45px;
            text-align: left;
        }
        .control-panel button {
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 6px 14px;
            margin-left: 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .control-panel button:hover { background: var(--btn-hover); }

        .scale-container {
            display: inline-block;
            margin: 0 auto;
            transform-origin: top center;
            /* 預設縮放 120% */
            transform: scale(1.2); 
        }

        .equipment-wrapper {
            position: relative;
            width: 460px;
            box-shadow: 0 0 0px rgba(0,0,0,0.7);
            border-radius: 10px;
        }

        /* ==========================================================
           [分頁內容基礎樣式] 
           ========================================================== */
        .tab-content {
            display: none;
            position: relative;
            width: 100%;
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }
        .tab-content.active { display: block; }
        #tab-equip {
            height: 497px;
            background-image: url('螢幕擷取畫面 2026-07-09 101829.jpg');
        }
        #tab-coord {
            height: 460px; 
            background-image: url('螢幕擷取畫面 2026-07-09 153219.jpg');
        }

        .tab-toggle-btn {
            position: absolute;
            top: 3%; right: 4%; width: 26%; height: 6.5%;
            cursor: pointer;
            background: rgba(255, 255, 255, 0);
            border: 2px solid transparent;
            border-radius: 15px;
            z-index: 90;
        }
        .tab-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* ==========================================================
           [裝備格子與覆蓋圖層] 
           ========================================================== */
        .slot {
            position: absolute;
            cursor: pointer;
            background: rgba(255, 255, 255, 0);
            border: 2px solid transparent;
            border-radius: 4px;
            z-index: 10;
        }
        #tab-equip .slot { width: 12.3%; height: 11.2%; }
        #tab-coord .slot { width: 12.3%; height: 12.3%; }
        
        .slot:hover {
            background: rgba(0, 255, 100, 0.05);
            border-color: var(--tooltip-border);
            box-shadow: inset 0 0 0px rgba(0, 255, 100, 0.6);
            z-index: 50;
        }

        .slot .equipped-badge {
            position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px;
            background-size: 124% 124%; 
            background-repeat: no-repeat;
            background-position: center 45%;
            border-radius: 4px;
            display: flex; align-items: flex-end; justify-content: center;
            pointer-events: none; 
            border: 2px solid #555; 
            box-shadow: inset 0 0 0px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .slot .equipped-badge span {
            background: rgba(16, 18, 23, 0.85);
            color: #fff; /* 標籤文字保持白色以維持辨識度 */
            font-size: 10px;
            width: 100%; padding: 2px 0;
            text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            letter-spacing: 0.5px;
        }

        /* ==========================================================
           [浮動選單 (Tooltip)] 
           ========================================================== */
        .tooltip {
            display: none;
            position: absolute;
            width: 260px;
            background-color: var(--tooltip-bg);
            border: 1px solid var(--tooltip-border);
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 6px 0px rgba(0,0,0,0.8);
            z-index: 100;
            text-align: left;
            cursor: default;
            transition: background-color 0.3s;
        }
        .slot:hover .tooltip { display: block; }

        .slot.side-left .tooltip { left: 108%; top: 50%; transform: translateY(-40%); }
        .slot.side-right .tooltip { right: 108%; top: 50%; transform: translateY(-40%); }
        .slot.side-bottom .tooltip { bottom: 108%; left: 50%; transform: translateX(-50%); }

        .tooltip-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
        }
        .tooltip-title span { color: var(--highlight); }
        .current-equipped { font-size: 11px; color: #00ffbc; margin-top: 2px; display: block;}

        .options-container { width: 100%; }

        .option-item {
            width: 100%;
            margin-bottom: 8px;
            font-size: 12px;
            background: var(--option-bg);
            padding: 8px;
            border-radius: 4px;
            border-left: 4px solid #555;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }
        .option-item:hover {
            background: var(--option-hover-bg);
            border-top: 1px solid var(--option-hover-border);
            border-right: 1px solid var(--option-hover-border);
            border-bottom: 1px solid var(--option-hover-border);
        }
        .option-item:last-child { margin-bottom: 0; }
        
        .option-item.tier-1 { border-left-color: #aaa; } 
        .option-item.tier-2 { border-left-color: #3498db; } 
        .option-item.tier-3 { border-left-color: #e74c3c; } 

        .option-header { font-weight: bold; margin-bottom: 4px; display: block; }
        .tier-1 .option-header { color: #bbb; }
        .tier-2 .option-header { color: #5dade2; }
        .tier-3 .option-header { color: #f1948a; }

        .option-body { display: flex; width: 100%; }
        
        .option-img {
            width: 32px; height: 32px;
            background-size: 120% 120%; background-position: center;
            border: 1px solid var(--border-color);
            border-radius: 4px; flex-shrink: 0;
        }
        .option-text {
            padding-left: 8px;
            color: var(--text-muted);
            line-height: 1.3;
        }

        /* ==========================================================
           [座標對齊] 
           ========================================================== */
        /* 分頁一 */

        .s-pendant1 { top: 22.5%; left: 4.3%; }

            document.body.classList.toggle('light-mode');

        // ==========================================================
        // [渲染生成與裝備套用]
        // ==========================================================
        function renderSlots(dataArray, targetContainerId) {
            const container = document.getElementById(targetContainerId);
            dataArray.forEach(slot => {
                const opt1Html = slot.t1 === "無其他推薦" ? "" : `
                    <div class="option-item tier-1" onclick="equipItem('${slot.id}', '${slot.t1}', '#aaaaaa', '${slot.prefix}-1.png')">
                        <span class="option-header">${slot.h1}</span>
                        <div class="option-body">
                            <div class="option-img" style="background-image: url('${slot.prefix}-1.png');"></div>
                            <div class="option-text">${slot.t1}</div>
                        </div>
                    </div>`;
                    
                const opt2Html = slot.t2 === "無其他推薦" ? "" : `
                    <div class="option-item tier-2" onclick="equipItem('${slot.id}', '${slot.t2}', '#3498db', '${slot.prefix}-2.png')">
                        <span class="option-header">${slot.h2}</span>
                        <div class="option-body">
                            <div class="option-img" style="background-image: url('${slot.prefix}-2.png');"></div>
                            <div class="option-text">${slot.t2}</div>
                        </div>
                    </div>`;
                    
                const opt3Html = slot.t3 === "無其他推薦" ? "" : `
                    <div class="option-item tier-3" onclick="equipItem('${slot.id}', '${slot.t3}', '#e74c3c', '${slot.prefix}-3.png')">
                        <span class="option-header">${slot.h3}</span>
                        <div class="option-body">
                            <div class="option-img" style="background-image: url('${slot.prefix}-3.png');"></div>
                            <div class="option-text">${slot.t3}</div>
                        </div>
                    </div>`;

                const slotHtml = `
                    <div class="slot ${slot.cls} ${slot.side}" id="slot-${slot.id}">
                        <div class="tooltip" onclick="event.stopPropagation();">
                            <div class="tooltip-title">
                                當前位置：<span>${slot.name} (${slot.prefix})</span>
                                <span class="current-equipped" id="current-${slot.id}">未裝備</span>
                            </div>
                            <div class="options-container">
                                ${opt1Html}
                                ${opt2Html}
                                ${opt3Html}
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', slotHtml);
            });
        }

        function equipItem(slotId, itemName, borderColor, imgName) {
            const slotDiv = document.getElementById(`slot-${slotId}`);
            const oldBadge = slotDiv.querySelector('.equipped-badge');
            if (oldBadge) { oldBadge.remove(); }
            
            const badge = document.createElement('div');
            badge.className = 'equipped-badge';
            badge.style.borderColor = borderColor; 
            badge.style.backgroundImage = `url('${imgName}')`;
            
            const nameSpan = document.createElement('span');
            nameSpan.innerText = itemName;
            badge.appendChild(nameSpan);
            
            slotDiv.appendChild(badge);
            document.getElementById(`current-${slotId}`).innerText = `已裝備：${itemName}`;
        }

        // 頁面初始化載入
        renderSlots(slotData, 'tab-equip');
        renderSlots(coordData, 'tab-coord');
